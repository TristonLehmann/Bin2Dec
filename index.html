<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>BinToDec</title>
        <link rel="stylesheet" href="./styles/styles.css"/>
        <script src="./scripts/index.js" defer></script>
    </head>
    <body>
        <main>
            <form action="#" method="POST">
                <label for="binary">Enter 8 binary digits:</label>
                <input type="number" maxlength="8" min="0" max="11111111" required />
                <output name="decimal" for="number"></output>
            </form>
        </main>
    </body>
</html>
